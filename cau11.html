<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Câu 2 - Chi tiết Vấn đáp</title>
    <style>
        /* Giữ nguyên CSS từ file Vandap.html để đồng bộ giao diện */
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .document-container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 40px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            min-height: 100vh;
            box-sizing: border-box; /* Đảm bảo padding không làm tăng chiều rộng khung */
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: #00338d;
            font-weight: bold;
        }
        h1 {
            color: #00338d;
            font-size: 24px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .answer-section {
            margin-top: 30px;
            text-align: justify;
        }
        .question-text {
            font-style: italic;
            background-color: #f9f9f9;
            padding: 15px;
            border-left: 5px solid #00338d;
            margin-bottom: 25px;
        }
        strong { color: #00338d; }
        
/* 2. THÊM ĐOẠN NÀY VÀO DƯỚI CÙNG PHẦN STYLE ĐỂ TỐI ƯU ĐIỆN THOẠI */
@media (max-width: 600px) {
    body {
        padding: 10px; /* Giảm lề ngoài của body */
    }
    .document-container {
        padding: 20px 15px; /* Trên điện thoại chỉ để lề trái/phải 15px thôi */
    }
    h1 {
        font-size: 20px; /* Giảm cỡ chữ tiêu đề cho vừa màn hình nhỏ */
    }
    p, .question-link {
        font-size: 16px; /* Cỡ chữ vừa đọc trên điện thoại */
    }
    /* 1. GIẢM THỤT LỀ CỦA DANH SÁCH */
    .answer-section ul {
        padding-left: 20px; /* Mặc định là 40px, giảm xuống 20px cho sát lề hơn */
        margin-left: 0;
    }

    /* 2. GIẢM KHOẢNG CÁCH GIỮA CÁC TỪ VÀ TRÁNH DÃN CHỮ */
    p, li {
        font-size: 15px;
        text-align: left; /* Trên mobile nên để left thay vì justify để tránh các lỗ hổng trắng giữa các từ */
        word-spacing: -1px; /* Giảm nhẹ khoảng cách giữa các từ cho gọn */
        letter-spacing: -0.2px; /* Giảm nhẹ khoảng cách giữa các chữ cái cho tinh tế */
    }
    
    .answer-section li {
        margin-bottom: 8px; /* Giảm bớt khoảng cách giữa các dòng liệt kê */
    }
    
}

 
        
    </style>
</head>
<body>

<div class="document-container">
    <a href="Vandap.html" class="back-link">← Quay lại danh mục câu hỏi</a>

    <h1>CÂU HỎI 2</h1>

    <div class="question-text">
        Nội dung câu hỏi tại đây
    </div>
	
	<div style="text-align: center; margin-bottom: 25px;">
        <img src="image/11.png" alt="Sơ đồ minh họa" style="max-width: 100%; height: auto; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
        <p style="font-size: 13px; color: #666; font-style: italic;">Hình 1: Sơ đồ minh họa </p>
    </div>
	
        
    <div class="answer-section">
        <p><strong>Trả lời:</strong></p>
        <p>Nội dung theo thông tư, điều gì....:</p>
        
        <ol> 

	li> Nội dung câu trả lời tại đây.</li>
     
        </ol>
        
    </div>

</div>

</body>
</html>
