<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học thi chứng chỉ AO</title>
    <style>
        /* Thiết kế chung */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        /* Thanh Navigation (Thanh menu trên cùng - GIỮ NGUYÊN) */
        .navbar {
            background-color: #0020C2; /* Màu xanh đậm giống ảnh */
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand {
            font-weight: bold;
            font-size: 18px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
        }

        .nav-links li {
            margin-left: 20px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            padding: 5px 0;
            text-transform: uppercase;
        }

        .nav-links a:hover, .nav-links a.active {
            border-bottom: 3px solid white; /* Hiệu ứng gạch chân khi chọn */
        }

        /* Header mới - THAY THẾ BANNER CŨ */
        .header-container {
            display: flex;
            flex-direction: column;
        }

        /* Dải trắng (Logo và Tên trạm) */
        .header-white-bar {
            background-color: white;
            padding: 20px;
            display: flex;
            justify-content: center; /* Căn giữa dải trắng */
            align-items: center;
        }
        .white-bar-content {
            display: flex;
            align-items: center;
            text-align: left; /* Tên trạm căn trái */
        }
        .header-logo {
            max-width: 150px; /* Điều chỉnh kích thước logo */
            margin-right: 20px;
        }
        .header-title {
            margin: 0;
            font-size: 24px;
            font-weight: bold;
            color: #0020C2; /* Màu xanh đậm */
            font-family: 'Times New Roman', Times, serif; /* Font serif giống ảnh */
            text-transform: uppercase;
        }

        /* Dải xanh đậm (Icon và Giới thiệu) */
        .header-blue-bar {
            background-color: #0020C2; /* Cùng màu menu cũ */
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: start; /* Căn trái dải xanh */
            align-items: center;
        }
        .blue-bar-content {
            display: flex;
            align-items: center;
        }
        .header-intro-icon {
            font-size: 18px;
            margin-right: 10px;
            font-weight: normal; /* Unicode icon có thể không bold */
        }
        .header-intro-text {
            font-size: 16px;
            font-weight: bold;
        }

        /* Phần nội dung phía dưới (Tùy chọn - GIỮ NGUYÊN) */
        .content {
            padding: 50px;
            text-align: center;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="brand">Học thi chứng chỉ AO</div>
        <ul class="nav-links">
            <li><a href="#" class="active">TRANG CHỦ</a></li>
            <li><a href="https://chien83.github.io/hoctracnghiema0/">HỌC-TRẮC NGHIỆM</a></li>
            <li><a href="#">VẤN ĐÁP</a></li>
            <li><a href="https://chien83.github.io/A0choMaytinh/">TEST - TRẮC NGHIỆM</a></li>
            <li><a href="https://chien83.github.io/thia0/">TEST - Điện thoại</a></li>
        </ul>
    </nav>

    <header class="header-container">
        <div class="header-white-bar">
            <div class="white-bar-content">
                <img src="https://static.wixstatic.com/media/011f06_8b86e08d51194212b4859a8523c94246~mv2.png/v1/fill/w_181,h_81,al_c,q_85,usm_0.66_1.00_0.01,enc_auto/logo-evnpt.png" alt="EVNPT Logo" class="header-logo">
                <h2 class="header-title">TRẠM 500 KV HOÀ BÌNH</h2>
            </div>
        </div>
        <div class="header-blue-bar">
            <div class="blue-bar-content">
                <span class="header-intro-icon">&#8962;</span> <span class="header-intro-text">Giới thiệu</span>
            </div>
        </div>
    </header>

    <div class="content">
        <h1>Hệ Thống Ôn Tập Trắc Nghiệm</h1>
        <p>Chọn các mục trên menu để bắt đầu luyện tập.</p>
    </div>

</body>
</html>
