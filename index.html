<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học thi chứng chỉ AO</title>
    <style>
        /* Thiết kế chung */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
        }

        /* 1. Thanh Menu trên cùng (Màu xanh đậm) */
        .navbar {
            background-color: #0020C2;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand {
            font-weight: bold;
            font-size: 18px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
        }

        .nav-links li {
            margin-left: 20px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            padding: 5px 0;
            text-transform: uppercase;
        }

        .nav-links a:hover, .nav-links a.active {
            border-bottom: 3px solid white;
        }

        /* 2. Khu vực Tiêu đề (Logo và Tên trạm) */
        .header-white-bar {
            background-color: white;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #eee; /* Đường kẻ mờ ngăn cách */
        }

        .white-bar-content {
            display: flex;
            align-items: center;
            gap: 20px; /* Khoảng cách giữa ảnh và chữ */
        }

        .header-logo {
            height: 80px; /* Bạn có thể tăng giảm chiều cao logo ở đây */
            width: auto;
        }

        .header-title {
            margin: 0;
            font-size: 28px;
            font-weight: bold;
            color: #0020C2;
            font-family: 'Times New Roman', Times, serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 3. Phần nội dung chính */
        .content {
            padding: 60px 20px;
            text-align: center;
        }

        .content h1 {
            font-size: 32px;
            margin-bottom: 15px;
        }

        .content p {
            color: #555;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <!-- Thanh Menu -->
    <nav class="navbar">
        <div class="brand">Học thi chứng chỉ AO</div>
        <ul class="nav-links">
            <li><a href="#" class="active">TRANG CHỦ</a></li>
            <li><a href="https://chien83.github.io/hoctracnghiema0/">HỌC-TRẮC NGHIỆM</a></li>
            <li><a href="#">VẤN ĐÁP</a></li>
            <li><a href="https://chien83.github.io/A0choMaytinh/">TEST - TRẮC NGHIỆM</a></li>
            <li><a href="https://chien83.github.io/thia0/">TEST - ĐIỆN THOẠI</a></li>
        </ul>
    </nav>

    <!-- Header chứa Logo và Tên trạm -->
    <header class="header-white-bar">
        <div class="white-bar-content">
            <!-- QUAN TRỌNG: Thay 'logo-cua-toi.png' bằng tên file ảnh bạn đã up lên GitHub -->
            <img src="logo.jpg" alt="EVNPT Logo" class="header-logo">
            
            <h2 class="header-title">TRẠM 500 KV HOÀ BÌNH</h2>
        </div>
    </header>

    <!-- Nội dung -->
    <main class="content">
        <h1>Hệ Thống Ôn Tập Trắc Nghiệm</h1>
        <p>Chọn các mục trên menu để bắt đầu luyện tập.</p>
    </main>

</body>
</html>
