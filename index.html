<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Ôn Tập Trắc Nghiệm</title>
    <!-- Thư viện icon FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Thiết lập chung */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            line-height: 1.6;
        }

        /* 1. KHỐI LOGO (Nền trắng) - Co giãn thông minh */
        .header-top {
            background-color: white;
            padding: 15px 5%;
            display: flex;
            align-items: center;
            justify-content: center; /* Luôn căn giữa logo */
        }

        .header-top img {
            max-width: 100%;    /* Không vượt quá chiều ngang màn hình */
            height: auto;       /* Giữ đúng tỷ lệ ảnh, không bị méo */
            display: block;
            width: 450px;       /* Kích thước logo chuẩn trên máy tính */
            transition: width 0.3s ease; /* Hiệu ứng mượt khi đổi kích thước */
        }

        /* 2. THANH ĐIỀU HƯỚNG (Nền xanh) */
        .navbar {
            background-color: #1a4694;
            min-height: 50px;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .nav-links {
            list-style: none;
            display: flex;
            flex-wrap: wrap; /* Tự động xuống dòng trên mobile nếu menu quá dài */
            margin: 0;
            padding: 0;
            justify-content: center;
        }

        .nav-links li {
            display: flex;
            align-items: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            text-align: center;
            text-transform: uppercase;
            transition: background 0.3s;
        }

        .nav-links a:hover {
            background-color: #0d3270;
        }

        /* Icon ngôi nhà */
        .nav-links a i {
            font-size: 18px;
        }

        /* 3. NỘI DUNG CHÍNH */
        .content {
            padding: 60px 20px;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }

        .content h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 20px;
            font-weight: 800;
        }

        .content p {
            font-size: 18px;
            color: #666;
        }

        /* --- ĐIỀU CHỈNH RIÊNG CHO ĐIỆN THOẠI (Responsive) --- */
        @media (max-width: 768px) {
            .header-top {
                padding: 10px;
            }

            .header-top img {
                width: 280px; /* Logo thu nhỏ lại trên điện thoại cho cân đối */
            }

            .nav-links a {
                font-size: 11px; /* Chữ menu nhỏ lại để không bị chồng chéo */
                padding: 10px 8px;
            }

            .content {
                padding: 40px 15px;
            }

            .content h1 {
                font-size: 24px; /* Tiêu đề nhỏ lại cho vừa màn hình điện thoại */
            }

            .content p {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

    <!-- PHẦN LOGO TRÊN CÙNG -->
    <header class="header-top">
        <!-- Đảm bảo file logo.png nằm cùng thư mục với file index.html này -->
        <img src="logo.png" alt="Logo Truyền tải điện Hòa Bình">
    </header>

    <!-- THANH MENU XANH -->
    <nav class="navbar">
        <ul class="nav-links">
            <!-- Icon ngôi nhà cho Trang Chủ -->
            <li><a href="#"><i class="fa-solid fa-house"></i></a></li>
            <li><a href="https://chien83.github.io/hoctracnghiema0/">HỌC-TRẮC NGHIỆM</a></li>
            <li><a href="#">VẤN ĐÁP</a></li>
            <li><a href="https://chien83.github.io/A0choMaytinh/">TEST - TRẮC NGHIỆM</a></li>
            <li><a href="https://chien83.github.io/thia0/">TEST - ĐIỆN THOẠI</a></li>
        </ul>
    </nav>

    <!-- NỘI DUNG TRANG CHỦ -->
    <main class="content">
        <h1>Hệ Thống Ôn Tập Trắc Nghiệm</h1>
        <p>Vui lòng chọn các mục trên menu để bắt đầu quá trình luyện tập và ôn thi.</p>
    </main>
<div class="copyright">Edit: chien500hb</div>
</body>
</html>
