<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học thi chứng chỉ AO</title>
    <style>
        /* Thiết kế chung */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        /* Thanh Navigation (Thanh menu trên cùng) */
        .navbar {
            background-color: #0020C2; /* Màu xanh đậm giống ảnh */
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand {
            font-weight: bold;
            font-size: 18px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
        }

        .nav-links li {
            margin-left: 20px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            padding: 5px 0;
            text-transform: uppercase;
        }

        .nav-links a:hover, .nav-links a.active {
            border-bottom: 3px solid white; /* Hiệu ứng gạch chân khi chọn */
        }

        /* Banner chính (Hero Section) */
        .hero {
            background-image: url('https://your-image-link.com/background.jpg'); /* Thay link ảnh cánh đồng gió của bạn vào đây */
            background-size: cover;
            background-position: center;
            height: 400px;
            display: flex;
            align-items: center;
            padding-left: 50px;
            position: relative;
        }

        .logo-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .logo-container img {
            display: block;
            max-width: 250px;
            margin-bottom: 10px;
        }

        /* Phần nội dung phía dưới (Tùy chọn) */
        .content {
            padding: 50px;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Menu điều hướng -->
    <nav class="navbar">
        <div class="brand">Học thi chứng chỉ AO</div>
        <ul class="nav-links">
            <li><a href="#" class="active">TRANG CHỦ</a></li>
            <!-- Thay link các trang trắc nghiệm của bạn vào đây -->
            <li><a href="https://chien83.github.io/hoctracnghiema0/">HỌC-TRẮC NGHIỆM</a></li>
            <li><a href="#">VẤN ĐÁP</a></li>
            <li><a href="https://chien83.github.io/A0choMaytinh/">TEST - TRẮC NGHIỆM</a></li>
            <li><a href="#">TEST - Điện thoại</a></li>
        </ul>
    </nav>

    <!-- Khu vực Banner -->
    <header class="hero">
        <div class="logo-container">
            <!-- Bạn cần tải ảnh logo lên cùng thư mục hoặc dùng link trực tiếp -->
            <img src="logo-evn.png" alt="EVN Logo">
            <div style="font-weight: bold; color: #0020C2;">
                EVNNPT <br>
                PTC1 <br>
                <small>CHIẾN-0986362234</small>
            </div>
        </div>
    </header>

    <div class="content">
        <h1>Hệ Thống Ôn Tập Trắc Nghiệm</h1>
        <p>Chọn các mục trên menu để bắt đầu luyện tập.</p>
    </div>

</body>
</html>
