<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Ôn Tập Trắc Nghiệm</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Thiết lập chung */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            line-height: 1.6;
            min-height: 100vh;
            /* Đệm dưới để nội dung không bị thanh chân trang che mất */
            padding-bottom: 70px; 
        }

        /* 1. KHỐI LOGO */
        .header-top {
            background-color: white;
            padding: 15px 5%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-top img {
            max-width: 100%;
            height: auto;
            display: block;
            width: 450px;
            transition: width 0.3s ease;
        }

        /* 2. THANH ĐIỀU HƯỚNG */
        .navbar {
            background-color: #1a4694;
            min-height: 50px;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .nav-links {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            margin: 0; padding: 0;
            justify-content: center;
        }

        .nav-links li { display: flex; align-items: center; }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            text-align: center;
            text-transform: uppercase;
            transition: background 0.3s;
        }

        .nav-links a:hover { background-color: #0d3270; }
        .nav-links a i { font-size: 18px; }

        /* 3. NỘI DUNG CHÍNH */
        .content {
            padding: 60px 20px;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }

        .content h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 20px;
            font-weight: 800;
        }

        .content p { font-size: 18px; color: #666; }

        /* 4. THANH CHÂN TRANG (FOOTER BAR) CỐ ĐỊNH */
        .footer-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #0000ff; /* Nền xanh */
            padding: 5px 20px;
            display: flex;
            justify-content: flex-end; /* Đẩy nội dung sang phải */
            align-items: center;
            z-index: 10000;
            box-sizing: border-box;
            height: 55px; /* Độ cao chân trang */
        }

        .footer-info {
            text-align: right;
            line-height: 1.3;
            font-weight: bold;
            font-size: 15px;
        }

        /* Màu đỏ cho phần Edit */
        .footer-info .name {
            color: #ff0000; 
        }

        /* Màu trắng cho Số điện thoại */
        .footer-info .phone {
            color: #ffffff;
        }

        /* --- ĐIỀU CHỈNH RIÊNG CHO ĐIỆN THOẠI --- */
        @media (max-width: 768px) {
            .header-top img { width: 280px; }
            .nav-links a { font-size: 11px; padding: 10px 8px; }
            .content h1 { font-size: 24px; }
            .content p { font-size: 15px; }
            
            .footer-bar { height: 45px; padding: 5px 15px; }
            .footer-info { font-size: 12px; }
        }
    </style>
</head>
<body>

    <header class="header-top">
        <img src="logo.png" alt="Logo Truyền tải điện Hòa Bình">
    </header>

    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="#"><i class="fa-solid fa-house"></i></a></li>
            <li><a href="https://chien83.github.io/hoctracnghiema0/">HỌC-TRẮC NGHIỆM</a></li>
            <li><a href="#">VẤN ĐÁP</a></li>
            <li><a href="https://chien83.github.io/A0choMaytinh/">TEST - TRẮC NGHIỆM</a></li>
            <li><a href="https://chien83.github.io/thia0/">TEST - ĐIỆN THOẠI</a></li>
        </ul>
    </nav>

    <main class="content">
        <h1>Hệ Thống Ôn Tập Trắc Nghiệm</h1>
        <p>Vui lòng chọn các mục trên menu để bắt đầu quá trình luyện tập và ôn thi.</p>
    </main>

    <footer class="footer-bar">
        <div class="footer-info">
            <span class="name">Edit: Chien500hb</span><br>
            <span class="phone">0986362234</span>
        </div>
    </footer>

</body>
</html>
