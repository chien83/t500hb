<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="format-detection" content="telephone=no">
    
    <link rel="icon" type="image/png" sizes="180x180" href="favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon.png">
    <title>VẬN HÀNH TRẠM ĐIỆN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Thiết lập chung */
        /* Thu nhỏ đệm của Body */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            line-height: 1.4; /* Giảm khoảng cách dòng */
            height: 100vh; /* Ép chiều cao toàn bộ trang bằng đúng màn hình */
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Ngăn toàn bộ trang bị cuộn */
        }

        /* 1. KHỐI LOGO - Thu hẹp lại */
            .header-top {
                background-color: white;
                padding: 5px 5%; /* Giảm từ 15px xuống 5px */
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .header-top img {
                height: 40px; /* Ép chiều cao logo cố định để tiết kiệm diện tích */
                width: auto;
            }

        /* 2. THANH ĐIỀU HƯỚNG - Giữ nguyên hoặc thu hẹp nhẹ */
        .navbar {
            background-color: #1a4694;
            min-height: 40px; /* Giảm từ 50px */
        }

        .nav-links {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            margin: 0; padding: 0;
            justify-content: center;
        }

        .nav-links li { display: flex; align-items: center; }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            text-align: center;
            text-transform: uppercase;
            transition: background 0.3s;
            cursor: pointer;
        }

        .nav-links a:hover { background-color: #0d3270; }
        .nav-links a i { font-size: 18px; }

        /* 3. NỘI DUNG CHÍNH - Thu gọn cực hạn */
        .content {
            padding: 10px 20px; /* Giảm từ 60px xuống 10px */
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }
        .content h1 {
            font-size: 20px; /* Thu nhỏ tiêu đề */
            margin-bottom: 5px;
        }
        .content p { font-size: 14px; margin: 0; }

        /* 4. KHỐI CHỨA ẢNH - Phần quan trọng nhất để không bị cuộn */
        .image-container {
            flex: 1; /* Tự động lấy toàn bộ phần diện tích còn lại */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-sizing: border-box;
            overflow: hidden;
        }
        
        .image-container img {
            max-width: 100%;
            max-height: 100%; /* Ép ảnh không được cao hơn phần diện tích còn lại */
            object-fit: contain; /* Giữ nguyên tỷ lệ ảnh mà vẫn vừa khung */
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        
        /* 5. FOOTER - Thu gọn diện tích */
        .footer-bar {
            position: relative; /* Đổi về relative để không đè lên ảnh */
            width: 100%;
            background-color: #0000ff;
            padding: 2px 20px;
            height: 40px; /* Giảm chiều cao */
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .footer-info {
            text-align: right;
            line-height: 1.3;
            font-weight: bold;
            font-size: 15px;
        }

        .footer-info .name { color: #ff0000; }

        /* Fix màu trắng cho số điện thoại kể cả khi nó là Link */
        .footer-info .phone, .footer-info a {
            color: #ffffff !important;
            text-decoration: none !important;
        }

        @media (max-width: 768px) {
            .header-top img { width: 280px; }
            .nav-links a { font-size: 11px; padding: 10px 8px; }
            .content h1 { font-size: 24px; }
            .content p { font-size: 15px; }
            .footer-bar { height: 45px; padding: 5px 15px; }
            .footer-info { font-size: 12px; }
        }
    </style>
</head>
<body>

    <header class="header-top">
        <img src="logo.png" alt="Logo">
    </header>

    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="#"><i class="fa-solid fa-house"></i></a></li>
            <li><a href="hoctracnghiema0/">HỌC-TRẮC NGHIỆM</a></li>
            <li><a onclick="checkVandapPass()">VẤN ĐÁP</a></li>
            <li><a href="A0choMaytinh/">TEST - TRẮC NGHIỆM</a></li>
            <li><a href="thia0/">TEST - ĐIỆN THOẠI</a></li>
        </ul>
        
    </nav>

    <main class="content">
        <h1>Hệ Thống Ôn Tập Trắc Nghiệm</h1>
        <p>Vui lòng chọn các mục trên menu để bắt đầu quá trình luyện tập và ôn thi.</p>
    </main>

    <div class="image-container">
        <img src="image/t500hb.png" >
        <p style="font-size: 11px; color: #666; margin-top: 5px;">Sơ đồ nhất thứ trạm 500kV Hòa Bình</p>
    </div>

    
    <footer class="footer-bar">
        <div class="footer-info">
            <span class="name">Edit: Chien500hb</span><br>
            <a href="tel:0986362234" class="phone">0986362234</a>
        </div>
    </footer>

<script>
// Thay đổi hàm cũ của sếp thành hàm này
function checkVandapPass() {
    document.getElementById('passwordModal').style.display = 'flex';
    document.getElementById('passInput').value = ''; // Xóa trắng ô nhập
    document.getElementById('passInput').focus();    // Tự động trỏ chuột vào ô nhập
}

function closeModal() {
    document.getElementById('passwordModal').style.display = 'none';
}

function validatePass() {
    var pass = document.getElementById('passInput').value;
    if (pass === "0986362234") {
        window.location.href = "Vandap.html";
    } else {
        alert("Mật khẩu sai, vui lòng thử lại!");
        document.getElementById('passInput').value = '';
    }
}

// Thêm tính năng nhấn Enter để xác nhận cho tiện sếp nhé
document.getElementById('passInput')?.addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
        validatePass();
    }
});
</script>
<div id="passwordModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:20000; align-items:center; justify-content:center;">
    <div style="background:white; padding:25px; border-radius:15px; width:90%; max-width:350px; text-align:center; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
        <h3 style="margin-top:0; color:#1a4694; font-size:18px;">XÁC THỰC TRUY CẬP</h3>
        <p style="font-size:14px; color:#666;">Nhập mật khẩu để vào mục Vấn Đáp:</p>
        <input type="password" id="passInput" style="width:100%; padding:10px; margin-bottom:20px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box; text-align:center; outline:none;" placeholder="••••••••">
        <div style="display:flex; gap:10px;">
            <button onclick="closeModal()" style="flex:1; padding:10px; border:none; border-radius:8px; background:#eee; cursor:pointer; font-weight:bold;">HỦY</button>
            <button onclick="validatePass()" style="flex:1; padding:10px; border:none; border-radius:8px; background:#1a4694; color:white; cursor:pointer; font-weight:bold;">XÁC NHẬN</button>
        </div>
    </div>
</div>
</body>
</html>
