<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Ôn Tập Trắc Nghiệm</title>
    <!-- Thêm thư viện icon để dùng biểu tượng ngôi nhà -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
        }

        /* 1. KHỐI LOGO (Nền trắng) */
        .header-top {
            background-color: white;
            padding: 15px 10%; /* Căn lề vào trong 10% */
            display: flex;
            align-items: center;
        }

        .header-top img {
            height: 70px; /* Điều chỉnh độ cao logo */
            width: auto;
            margin-right: 20px;
        }

        .header-text {
            display: flex;
            flex-direction: column;
        }

        .header-text .main-title {
            font-size: 28px;
            font-weight: bold;
            color: #1a4694; /* Màu xanh EVN */
            letter-spacing: -1px;
        }

        .header-text .main-title span {
            color: #ed1c24; /* Màu đỏ chữ NPT */
        }

        .header-text .sub-title {
            font-size: 14px;
            font-weight: bold;
            color: #1a4694;
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* 2. THANH ĐIỀU HƯỚNG (Nền xanh) */
        .navbar {
            background-color: #1a4694; /* Màu xanh đậm của EVNNPT */
            padding: 0 10%;
            display: flex;
            align-items: center;
            height: 45px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-links {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
            align-items: center;
            height: 100%;
        }

        .nav-links li {
            height: 100%;
            display: flex;
            align-items: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            padding: 0 15px;
            height: 100%;
            display: flex;
            align-items: center;
            transition: background 0.3s;
        }

        /* Hiệu ứng hover giống trang gốc */
        .nav-links a:hover {
            background-color: #0d3270;
        }

        /* Icon ngôi nhà */
        .nav-links a i {
            font-size: 18px;
        }

        /* 3. NỘI DUNG CHÍNH */
        .content {
            padding: 80px 20px;
            text-align: center;
        }

        .content h1 {
            font-size: 32px;
            color: #333;
        }
    </style>
</head>
<body>

    <!-- PHẦN LOGO TRÊN CÙNG -->
    <header class="header-top">
        <!-- Thay 'logo-cua-toi.png' bằng file ảnh của bạn -->
        <img src="logo-cua-toi.png" alt="Logo EVNNPT">
        
        <div class="header-text">
            <div class="main-title">EVN<span>NPT</span></div>
            <div class="sub-title">Tổng công ty truyền tải điện quốc gia</div>
        </div>
    </header>

    <!-- THANH MENU XANH -->
    <nav class="navbar">
        <ul class="nav-links">
            <!-- Icon ngôi nhà cho Trang Chủ -->
            <li><a href="#"><i class="fa-solid fa-house"></i></a></li>
            <li><a href="https://chien83.github.io/hoctracnghiema0/">HỌC-TRẮC NGHIỆM</a></li>
            <li><a href="#">VẤN ĐÁP</a></li>
            <li><a href="https://chien83.github.io/A0choMaytinh/">TEST - TRẮC NGHIỆM</a></li>
            <li><a href="https://chien83.github.io/thia0/">TEST - ĐIỆN THOẠI</a></li>
        </ul>
    </nav>

    <!-- NỘI DUNG TRANG CHỦ -->
    <main class="content">
        <h1>Hệ Thống Ôn Tập Trắc Nghiệm</h1>
        <p>Chọn các mục trên menu để bắt đầu luyện tập.</p>
    </main>

</body>
</html>
