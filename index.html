<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Ôn Tập Trắc Nghiệm</title>
    <style>
        /* Thiết kế chung */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
        }

        /* 1. Thanh Điều hướng (Màu xanh đậm) */
        .navbar {
            background-color: #0020C2;
            color: white;
            display: flex;
            justify-content: space-between; /* Đẩy logo sang trái, menu sang phải */
            align-items: center;
            padding: 5px 40px; /* Padding nhỏ để thanh điều hướng gọn gàng */
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 60px; /* Cố định độ cao thanh menu */
        }

        /* Logo nằm trong thanh điều hướng */
        .nav-logo {
            height: 50px; /* Tự động co giãn theo chiều cao thanh menu */
            width: auto;
            display: block;
        }

        .nav-links {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
        }

        .nav-links li {
            margin-left: 20px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            padding: 5px 0;
            text-transform: uppercase;
        }

        .nav-links a:hover, .nav-links a.active {
            border-bottom: 3px solid white;
        }

        /* 2. Phần nội dung chính bên dưới */
        .content {
            padding: 100px 20px;
            text-align: center;
        }

        .content h1 {
            font-size: 32px;
            margin-bottom: 15px;
        }

        .content p {
            color: #555;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <!-- Thanh Điều hướng -->
    <nav class="navbar">
        <!-- Chèn Logo của bạn vào đây (Thay 'logo-cua-toi.png' bằng tên file của bạn) -->
        <a href="#">
            <img src="logo-cua-toi.png" alt="Logo" class="nav-logo">
        </a>
        
        <ul class="nav-links">
            <li><a href="#" class="active">TRANG CHỦ</a></li>
            <li><a href="https://chien83.github.io/hoctracnghiema0/">HỌC-TRẮC NGHIỆM</a></li>
            <li><a href="#">VẤN ĐÁP</a></li>
            <li><a href="https://chien83.github.io/A0choMaytinh/">TEST - TRẮC NGHIỆM</a></li>
            <li><a href="https://chien83.github.io/thia0/">TEST - ĐIỆN THOẠI</a></li>
        </ul>
    </nav>

    <!-- Nội dung trang -->
    <main class="content">
        <h1>Hệ Thống Ôn Tập Trắc Nghiệm</h1>
        <p>Chọn các mục trên menu để bắt đầu luyện tập.</p>
    </main>

</body>
</html>
