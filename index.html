<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Ôn Tập Trắc Nghiệm</title>
    <!-- Thêm thư viện icon để dùng biểu tượng ngôi nhà -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #ffffff;
    }

    /* 1. KHỐI LOGO (Nền trắng) */
    .header-top {
        background-color: white;
        padding: 15px 5%; /* Giảm padding trên di động */
        display: flex;
        align-items: center;
        justify-content: center; /* Căn giữa logo trên mobile */
    }

    .header-top img {
        height: 60px; /* Thu nhỏ logo một chút */
        width: auto;
    }

    /* 2. THANH ĐIỀU HƯỚNG (Nền xanh) */
    .navbar {
        background-color: #1a4694;
        padding: 0 5%;
        display: flex;
        justify-content: center;
        min-height: 45px; /* Dùng min-height thay vì height cố định */
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    .nav-links {
        list-style: none;
        display: flex;
        flex-wrap: wrap; /* Cho phép các mục nhảy dòng nếu thiếu chỗ */
        margin: 0;
        padding: 0;
        justify-content: center;
    }

    .nav-links li {
        display: flex;
        align-items: center;
    }

    .nav-links a {
        color: white;
        text-decoration: none;
        font-size: 13px; /* Font chuẩn máy tính */
        font-weight: bold;
        padding: 10px 12px;
        display: flex;
        align-items: center;
        text-align: center;
    }

    .nav-links a:hover {
        background-color: #0d3270;
    }

    /* 3. NỘI DUNG CHÍNH */
    .content {
        padding: 50px 20px;
        text-align: center;
    }

    .content h1 {
        font-size: 28px;
        color: #333;
        line-height: 1.2;
    }

    /* --- ĐIỀU CHỈNH RIÊNG CHO ĐIỆN THOẠI (Responsive) --- */
    @media (max-width: 600px) {
        .header-top {
            padding: 10px;
        }
        
        .header-top img {
            height: 45px; /* Logo nhỏ hơn trên điện thoại */
        }

        .nav-links a {
            font-size: 10px; /* Chữ menu nhỏ lại để không bị đè lên nhau */
            padding: 8px 6px;
        }

        .content h1 {
            font-size: 22px; /* Tiêu đề chính nhỏ lại cho vừa màn hình */
        }

        .content p {
            font-size: 14px;
        }
    }
</style>
</head>
<body>

    <!-- PHẦN LOGO TRÊN CÙNG -->
    <header class="header-top">
        <!-- Thay 'logo-cua-toi.png' bằng file ảnh của bạn -->
        <img src="logo.png" alt="Logo EVNNPT">
        

    </header>

    <!-- THANH MENU XANH -->
    <nav class="navbar">
        <ul class="nav-links">
            <!-- Icon ngôi nhà cho Trang Chủ -->
            <li><a href="#"><i class="fa-solid fa-house"></i></a></li>
            <li><a href="https://chien83.github.io/hoctracnghiema0/">HỌC-TRẮC NGHIỆM</a></li>
            <li><a href="#">VẤN ĐÁP</a></li>
            <li><a href="https://chien83.github.io/A0choMaytinh/">TEST - TRẮC NGHIỆM</a></li>
            <li><a href="https://chien83.github.io/thia0/">TEST - ĐIỆN THOẠI</a></li>
        </ul>
    </nav>

    <!-- NỘI DUNG TRANG CHỦ -->
    <main class="content">
        <h1>Hệ Thống Ôn Tập Trắc Nghiệm</h1>
        <p>Chọn các mục trên menu để bắt đầu luyện tập.</p>
    </main>

</body>
</html>
