<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="format-detection" content="telephone=no">
    
    <link rel="icon" type="image/png" sizes="180x180" href="favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon.png">
    <title>VẬN HÀNH TRẠM ĐIỆN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* 1. THIẾT LẬP TOÀN TRANG (KHÔNG CUỘN) */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Khóa cuộn trang */
        }

        /* 2. LOGO - CĂN THẲNG VỚI ICON HOME (18px) */
        .header-top {
            background-color: white;
            padding: 8px 0;
            display: flex;
            justify-content: flex-start;
            width: 100%;
        }
        
        .header-top img {
            height: 45px; /* Chiều cao vừa phải để không chiếm chỗ ảnh sơ đồ */
            width: auto;
            margin-left: 18px; /* Khớp với padding của icon Home bên dưới */
        }

        /* 3. MENU NAVBAR */
        .navbar {
            background-color: #1a4694;
            display: flex;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .nav-links {
            list-style: none;
            display: flex;
            margin: 0; padding: 0;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            padding: 12px 18px; /* 18px này khớp với margin-left của Logo */
            display: flex;
            align-items: center;
            text-transform: uppercase;
            transition: background 0.3s;
            cursor: pointer;
        }

        .nav-links a:hover { background-color: #0d3270; }
        .nav-links a i { font-size: 18px; }

        /* 4. TIÊU ĐỀ NGẮN GỌN */
        .content {
            padding: 10px 20px;
            text-align: center;
        }
        .content h1 {
            font-size: 18px;
            color: #333;
            margin: 5px 0;
            font-weight: 800;
        }
        .content p { font-size: 13px; color: #666; margin: 0; }

        /* 5. KHỐI CHỨA SƠ ĐỒ - GIÃN 2 BÊN, KHÔNG VỠ HÌNH */
        .image-container {
            flex: 1; /* Lấy toàn bộ không gian còn lại */
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            overflow: hidden;
            background-color: #fcfcfc;
        }
        
        .image-container img {
            width: 100%;      /* Giãn hết chiều ngang */
            height: 100%;     /* Giãn hết chiều dọc của vùng trống */
            object-fit: contain; /* QUAN TRỌNG: Giãn tối đa nhưng giữ đúng tỷ lệ sơ đồ, không làm vỡ/méo */
        }

        /* 6. FOOTER - DẠT TRÁI */
        .footer-bar {
            width: 100%;
            background-color: #0000ff;
            padding: 5px 18px; /* 18px để thẳng hàng với Logo và Home */
            display: flex;
            justify-content: flex-start;
            align-items: center;
            height: 40px;
            box-sizing: border-box;
        }
        
        .footer-info {
            text-align: left;
            line-height: 1.2;
            font-size: 13px;
            font-weight: bold;
        }

        .footer-info .name { color: #ff0000; }
        .footer-info a {
            color: #ffffff !important;
            text-decoration: none !important;
        }

        /* Responsive cho Mobile */
        @media (max-width: 768px) {
            .header-top img { height: 35px; margin-left: 10px; }
            .nav-links a { font-size: 11px; padding: 10px 10px; }
            .footer-bar { padding: 5px 10px; }
        }
    </style>
</head>
<body>

    <header class="header-top">
        <img src="logo.png" alt="Logo">
    </header>

    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="#"><i class="fa-solid fa-house"></i></a></li>
            <li><a href="hoctracnghiema0/">HỌC-TRẮC NGHIỆM</a></li>
            <li><a onclick="checkVandapPass()">VẤN ĐÁP</a></li>
            <li><a href="A0choMaytinh/">TEST - TRẮC NGHIỆM</a></li>
            <li><a href="thia0/">TEST - ĐIỆN THOẠI</a></li>
        </ul>
    </nav>

    <main class="content">
        <h1>Hệ Thống Ôn Tập Trắc Nghiệm</h1>
        <p>Vui lòng chọn các mục trên menu để bắt đầu</p>
    </main>

    <div class="image-container">
        <img src="image/t500hb.png" alt="Sơ đồ nhất thứ">
    </div>

    <footer class="footer-bar">
        <div class="footer-info">
            <span class="name">Edit: Chien500hb</span><br>
            <a href="tel:0986362234">0986362234</a>
        </div>
    </footer>

    <div id="passwordModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:20000; align-items:center; justify-content:center;">
        <div style="background:white; padding:25px; border-radius:15px; width:90%; max-width:350px; text-align:center; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
            <h3 style="margin-top:0; color:#1a4694; font-size:18px;">XÁC THỰC TRUY CẬP</h3>
            <p style="font-size:14px; color:#666;">Nhập mật khẩu để vào mục Vấn Đáp:</p>
            <input type="password" id="passInput" style="width:100%; padding:10px; margin-bottom:20px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box; text-align:center;" placeholder="••••••••">
            <div style="display:flex; gap:10px;">
                <button onclick="closeModal()" style="flex:1; padding:10px; border:none; border-radius:8px; background:#eee; cursor:pointer; font-weight:bold;">HỦY</button>
                <button onclick="validatePass()" style="flex:1; padding:10px; border:none; border-radius:8px; background:#1a4694; color:white; cursor:pointer; font-weight:bold;">XÁC NHẬN</button>
            </div>
        </div>
    </div>

    <script>
    function checkVandapPass() {
        document.getElementById('passwordModal').style.display = 'flex';
        document.getElementById('passInput').value = '';
        document.getElementById('passInput').focus();
    }

    function closeModal() {
        document.getElementById('passwordModal').style.display = 'none';
    }

    function validatePass() {
        var pass = document.getElementById('passInput').value;
        if (pass === "0986362234") {
            window.location.href = "Vandap.html";
        } else {
            alert("Mật khẩu sai, vui lòng thử lại!");
            document.getElementById('passInput').value = '';
        }
    }

    document.getElementById('passInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') validatePass();
    });
    </script>
</body>
</html>
