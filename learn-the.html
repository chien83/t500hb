<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    :root { 
      --primary: #1a73e8; --success: #0f9d58; --bg: #f0f2f5; --text: #202124;
    }

    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: var(--bg); margin: 0; padding: 0; color: var(--text);
      overflow-x: hidden; -webkit-tap-highlight-color: transparent;
    }

    /* HEADER */
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(255, 255, 255, 0.95); 
      padding: 4px 10px;
      text-align: center; border-bottom: 1px solid #e0e0e0;
      transition: transform 0.3s ease;
    }
    
    .header.hide { transform: translateY(-100%); }
    .header h3 { margin: 0; color: var(--primary); font-size: 0.9rem; display: inline-block; }
    .hint { font-size: 0.7rem; color: #777; display: block; margin-top: -2px; }

    .container { 
      width: 100%; max-width: 1100px; margin: 55px auto 0; 
      padding: 8px; box-sizing: border-box; 
    }
    
    .card { 
      background: white; border-radius: 8px; padding: 12px 15px; margin-bottom: 8px;
      border: 1px solid #e8eaed; width: 100%; box-sizing: border-box;
      position: relative; cursor: pointer;
    }
    
    .card:active { background: #f8f9fa; }
    .q-text { font-size: 0.95rem; font-weight: 500; line-height: 1.4; }
    
    .ans-zone { 
      display: none; margin-top: 10px; padding: 10px;
      background: #e6f4ea; color: var(--success); 
      border-radius: 6px; font-weight: bold; font-size: 0.9rem;
      border-left: 4px solid var(--success);
    }
    
    .card.show .ans-zone, .card.show-all .ans-zone { display: block; }
    .options { display: none; list-style: none; padding: 0; margin: 10px 0 0 0; border-top: 1px solid #eee; }
    .card.show-all .options { display: block; }
    
    .opt { padding: 10px; background: #f8f9fa; margin: 6px 0; border-radius: 6px; font-size: 0.9rem; border: 1px solid #eee; }
    .correct { background: #d4edda !important; color: #155724 !important; border-color: #c3e6cb; font-weight: 600; }

    /* LOGIN SCREEN */
    #login-screen { position: fixed; inset: 0; background: #f0faff; z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
    input { width: 100%; padding: 12px; margin: 10px 0; border: 1.5px solid #dadce0; border-radius: 8px; font-size: 1rem; box-sizing: border-box; outline: none; }
    .btn-login { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }

    /* Tối ưu máy tính */
    @media (min-width: 1024px) {
      .q-text { font-size: 1.5rem !important; line-height: 1.5; margin-bottom: 10px; }
      .ans-zone { font-size: 1.2rem; }
      .opt { font-size: 1.1rem; }
    }

    /* ADMIN BYPASS CSS */
    .admin-active #login-screen { display: none !important; }
    .admin-active #main-app { display: block !important; }
    /* Style cho các nút tăng giảm cỡ chữ */
.font-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px; /* Khoảng cách giữa nút và tiêu đề */
}

.btn-font {
  background: #f1f3f4;
  border: 1px solid #dadce0;
  border-radius: 4px;
  padding: 2px 10px;
  font-size: 0.8rem;
  font-weight: bold;
  cursor: pointer;
  color: var(--primary);
  user-select: none;
}

.btn-font:active {
  background: #e8eaed;
}
  </style>
</head>

<body class="<?= (browserEmail === 'hchien83@gmail.com' || isAdminByLink) ? 'admin-active' : '' ?>">

<div id="login-screen">
  <div class="login-box">
    <h3 style="color: var(--primary); margin-bottom: 20px;">ÔN TẬP GHI NHỚ</h3>
    <input type="email" id="email" placeholder="Email của bạn...">
    <button class="btn-login" onclick="handleManualLogin()">VÀO HỌC</button>
    <p id="msg" style="color:#d93025; font-size: 0.8rem; margin-top: 12px;"></p>
  </div>
</div>

<div id="main-app" style="display:none;">
<div class="header" id="smart-header">
  <div class="font-controls">
    <button class="btn-font" onclick="changeFontSize(-2)">A-</button>
    <h3>Ôn Tập Thông Minh</h3>
    <button class="btn-font" onclick="changeFontSize(2)">A+</button>
  </div>
  <div class="hint" id="device-hint"></div>
</div>

  <div class="container">
    <div id="content"></div>
    <button onclick="fetchServerData()" id="btn-refresh" style="width:100%; padding: 15px; border-radius: 8px; background: #5f6368; color:white; border:none; margin: 20px 0 50px 0; font-weight:bold; font-size:0.9rem; cursor:pointer;">
      🔄 ĐỔI BỘ CÂU HỎI KHÁC
    </button>
  </div>
</div>

<script>
  // --- 1. CẤU HÌNH BIẾN ---
  const REAL_BROWSER_EMAIL = "<?= browserEmail ?>".toLowerCase().trim(); 
  const IS_ADMIN_BY_LINK = <?= typeof isAdminByLink !== 'undefined' ? isAdminByLink : 'false' ?>;
  
  // BIẾN LƯU TRỮ EMAIL ĐÃ XÁC THỰC
  let authenticatedEmail = "";

  let tapTimer = null;
  let lastScrollY = window.scrollY;
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

  // --- 2. TỰ ĐỘNG XÁC THỰC ---
  window.onload = function() {
    document.getElementById('device-hint').innerText = isMobile ? "Chạm 1: Đ/A | Chạm 2: 4 câu" : "Rê chuột: Đ/A | Click: 4 câu";
    
    if (REAL_BROWSER_EMAIL === "hchien83@gmail.com" || IS_ADMIN_BY_LINK === true) {
      console.log("Admin hchien83 - Tự động tải dữ liệu...");
      authenticatedEmail = "hchien83@gmail.com";
      fetchServerData(authenticatedEmail);
    }
  };

  // --- 3. LOGIC ĐĂNG NHẬP ---
  function handleManualLogin() {
    const mail = document.getElementById('email').value.trim();
    if(!mail) {
      document.getElementById('msg').innerText = "Vui lòng nhập Email!";
      return;
    }
    authenticatedEmail = mail; // Lưu email người dùng nhập
    fetchServerData(authenticatedEmail);
  }

  function fetchServerData(targetEmail) {
    const msg = document.getElementById('msg');
    const btnRefresh = document.getElementById('btn-refresh');
    
    // ƯU TIÊN: Dùng email đã được xác thực (authenticatedEmail)
    const emailToUse = targetEmail || authenticatedEmail || document.getElementById('email').value.trim();
    
    if(!emailToUse) return;

    if(btnRefresh) { btnRefresh.innerText = "⏳ ĐANG TẢI..."; btnRefresh.disabled = true; }
    if(msg) msg.innerText = "Đang xác thực và tải dữ liệu...";

    google.script.run.withSuccessHandler(res => {
      if (btnRefresh) { btnRefresh.innerText = "🔄 ĐỔI BỘ CÂU HỎI KHÁC"; btnRefresh.disabled = false; }

      if(res.success) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        window.scrollTo(0, 0);
        render(res.data);
      } else {
        if(msg) msg.innerHTML = res.msg + `<br><small>ID: ${REAL_BROWSER_EMAIL || 'N/A'}</small>`;
      }
    }).verifyAndGetData(emailToUse);
  }

  // --- 4. HIỂN THỊ DỮ LIỆU ---
  function render(data) {
    let html = '';
    data.forEach((row, i) => {
      html += `
        <div class="card" 
             onmouseenter="handleHover(this, true)" 
             onmouseleave="handleHover(this, false)"
             onclick="handleClick(this, event)">
          <div class="q-text">${i+1}. ${row[0]}</div>
          <ul class="options">
            <li class="opt ${String(row[5]).trim() == String(row[1]).trim() ? 'correct' : ''}">A. ${row[1]}</li>
            <li class="opt ${String(row[5]).trim() == String(row[2]).trim() ? 'correct' : ''}">B. ${row[2]}</li>
            <li class="opt ${String(row[5]).trim() == String(row[3]).trim() ? 'correct' : ''}">C. ${row[3]}</li>
            <li class="opt ${String(row[5]).trim() == String(row[4]).trim() ? 'correct' : ''}">D. ${row[4]}</li>
          </ul>
          <div class="ans-zone">✅ Đáp án: ${row[5]}</div>
        </div>
      `;
    });
    document.getElementById('content').innerHTML = html;
  }

  // --- 5. HIỆU ỨNG TƯƠNG TÁC ---
  function handleHover(el, isIn) {
    if (isMobile) return;
    if(isIn) el.classList.add('show');
    else el.classList.remove('show', 'show-all');
  }

  function handleClick(el, e) {
    if (!isMobile) {
      el.classList.toggle('show-all');
      el.classList.remove('show');
      return;
    }
    if (!tapTimer) {
      tapTimer = setTimeout(() => {
        tapTimer = null;
        document.querySelectorAll('.card').forEach(c => { if(c !== el) c.classList.remove('show', 'show-all'); });
        el.classList.toggle('show');
      }, 250);
    } else {
      clearTimeout(tapTimer);
      tapTimer = null;
      el.classList.toggle('show-all');
      el.classList.remove('show');
    }
  }

  window.addEventListener('scroll', () => {
    const header = document.getElementById('smart-header');
    if (window.scrollY > lastScrollY && window.scrollY > 50) header.classList.add('hide');
    else header.classList.remove('hide');
    lastScrollY = window.scrollY;
  });

  document.addEventListener('touchstart', (e) => {
    if (!e.target.closest('.card')) {
      document.querySelectorAll('.card').forEach(c => c.classList.remove('show', 'show-all'));
    }
  });

// Hàm thay đổi kích thước chữ
let currentFontSize = 100; // Đơn vị %

function changeFontSize(delta) {
  currentFontSize += delta;
  // Giới hạn không cho chữ quá nhỏ hoặc quá to (từ 70% đến 200%)
  if (currentFontSize < 70) currentFontSize = 70;
  if (currentFontSize > 200) currentFontSize = 200;
  
  // Áp dụng vào toàn bộ body (tác động lên đơn vị rem của file)
  document.documentElement.style.fontSize = currentFontSize + "%";
}

</script>
</body>
</html>
