<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô phỏng Xung Điện (Electrical Pulse)</title>
    <style>
        /* PHẦN CÀI ĐẶT BIẾN */
        :root {
            --bg-color: #0b0e14;           /* Nền tối sâu */
            --wire-color: #1a1f26;         /* Màu dây điện khi không có điện */
            --pulse-color: #f1c40f;        /* Màu vàng tia điện (có thể đổi thành #00ff88) */
            --pulse-speed: 1s;             /* Thời gian chạy từ A sang B */
            --wire-height: 9px;            /* Dây điện nên mảnh hơn ống nước */
            --node-color: #2c3e50;
        }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .container {
            display: flex;
            align-items: center;
            width: 80%;
            max-width: 600px;
        }

        /* Điểm A và B */
        .node {
            width: 50px;
            height: 50px;
            background-color: var(--node-color);
            border: 1px solid #444;
            border-radius: 50%; /* Hình tròn cho giống node mạch điện */
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 2;
        }

        /* Dây điện */
        .wire {
            flex-grow: 1;
            height: var(--wire-height);
            background-color: var(--wire-color);
            position: relative;
            overflow: hidden; /* Quan trọng để xung điện biến mất khi ra khỏi dây */
        }

        /* Tia điện (Pulse) */
        .wire::after {
            content: "";
            position: absolute;
            top: 0;
            left: -30%; /* Bắt đầu ngoài phạm vi nhìn thấy */
            width: 30%;  /* Độ dài của tia điện */
            height: 100%;
            
            /* Tạo hình tia điện mờ dần 2 đầu */
            background: linear-gradient(90deg, 
                transparent, 
                var(--pulse-color) 50%, 
                transparent
            );
            
            /* Hiệu ứng rực sáng (Glow) */
            box-shadow: 0 0 15px var(--pulse-color), 0 0 5px white;
            
            /* Chạy animation */
            animation: pulse-run var(--pulse-speed) cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        /* Định nghĩa chuyển động của tia điện */
        @keyframes pulse-run {
            0% {
                left: -30%;
            }
            70%, 100% { /* 70% để tia điện dừng lại một chút ở điểm B trước khi lặp lại */
                left: 100%;
            }
        }

        .info {
            margin-top: 40px;
            text-align: center;
            color: #555;
        }

        .info b {
            color: var(--pulse-color);
            text-shadow: 0 0 5px var(--pulse-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="node">A</div>
        <div class="wire"></div>
        <div class="node">B</div>
    </div>

    <div class="info">
        <h3>Hiệu ứng Xung Điện (Pulse Effect)</h3>
        <p>Tín hiệu được truyền từ A sang B với <b>gia tốc nhanh dần</b> và <b>hiệu ứng rực sáng</b>.</p>
    </div>

</body>
</html>
