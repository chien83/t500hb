<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tổng quan Bảo vệ Rơ le - T500HB</title>
    <style>
        /* 1. ĐỊNH DẠNG NỀN VÀ KHUNG CHỨA */
        body {
            font-family: "Times New Roman", Times, serif;
            line-height: 1.4;
            color: #000;
            background-color: #e9ecef;
            margin: 0;
            padding: 0;
        }

        .document-container {
            max-width: 850px;
            margin: 0 auto;
            background-color: #e9ecef;
            padding: 10px 40px 20px;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* 2. DÀN HÀNG NGANG TIÊU ĐỀ (PC) */
        .header-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #00338d;
            padding-bottom: 8px;
            margin-bottom: 10px;
        }

        .back-home {
            text-decoration: none;
            color: #888;
            font-size: 10.5pt;
            font-style: italic;
            white-space: nowrap;
        }
        .back-home:hover { color: #00338d; text-decoration: underline; }

        h1 {
            margin: 0;
            padding: 0;
            color: #00338d;
            font-size: 18pt;
            text-align: center;
            flex: 1; /* Để tiêu đề chiếm không gian còn lại */
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* 3. KHUNG PDF TO TOÀN MÀN HÌNH */
        .full-width-pdf {
            width: 100vw;
            position: relative;
            left: 50%;
            right: 50%;
            margin-left: -50vw;
            margin-right: -50vw;
            height: 90vh;
            background-color: #525659;
        }

        .zoom-link {
            display: block;
            text-align: center;
            margin-top: 10px;
            color: #00338d;
            text-decoration: none;
            font-style: italic;
            font-size: 10.5pt;
            opacity: 0.8;
        }

        /* 4. TỐI ƯU SIÊU GỌN CHO ĐIỆN THOẠI */
        @media (max-width: 600px) {
            .document-container { 
                padding: 5px 10px 10px; 
            }
            
            .header-wrapper {
                display: flex;
                flex-direction: row; /* ÉP LÊN CÙNG MỘT HÀNG */
                justify-content: space-between;
                align-items: center;
                position: relative;
                border-bottom: 1px solid #00338d;
                padding-bottom: 5px;
                margin-bottom: 5px; /* Co tối đa hộp xanh */
            }

        .back-home {
            position: absolute; /* Nhấc nút ra khỏi hàng để không đẩy tiêu đề */
            left: 1;            /* Ép nó sát lề trái */
            text-decoration: none;
            color: #888;
            font-size: 9pt;     /* Thu nhỏ lại cho gọn */
            font-style: italic;
            white-space: nowrap;
        }

            h1 {
                margin: 0;
                padding: 0;
                color: #00338d;
                font-size: 10pt;    /* Cỡ chữ Chiến muốn thu nhỏ trên mobile */
                text-align: center; /* Căn giữa tuyệt đối */
                width: 100%;
                text-transform: uppercase;
            }

            .full-width-pdf { height: 88vh; }
        }
    </style>
</head>
<body>

<div class="document-container">
    <div class="header-wrapper">
        <a href="../index.html" class="back-home">← Quay lại</a>
        <h1>Bảo vệ rơ le</h1>
    </div>

    <div class="full-width-pdf">
        <iframe 
            src="https://docs.google.com/viewer?url=https://nganhdien.io.vn/data/bvrl/BVRL.pdf&embedded=true" 
            width="100%" 
            height="100%" 
            style="border: none;">
        </iframe>
    </div>


</body>
</html>
