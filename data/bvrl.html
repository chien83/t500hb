<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tổng quan Bảo vệ Rơ le - T500HB</title>
    <style>
        /* 1. ĐỊNH DẠNG CƠ BẢN */
        body {
            font-family: "Times New Roman", Times, serif;
            line-height: 1.5;
            color: #000;
            background-color: #e9ecef; 
            margin: 0;
            padding: 0;
        }

        .document-container {
            max-width: 850px;
            margin: 0 auto;
            background: #fff;
            /* Giảm padding trên xuống còn 15px để PDF đẩy lên cao hơn */
            padding: 15px 40px 30px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* 2. NÚT QUAY LẠI - Thu nhỏ và làm mờ bớt để tinh tế */
        .back-home {
            display: inline-block;
            margin-bottom: 5px;
            text-decoration: none;
            color: #888;
            font-size: 10.5pt;
            font-style: italic;
        }
        .back-home:hover { color: #00338d; text-decoration: underline; }

        /* 3. TIÊU ĐỀ - Đã thu nhỏ (18pt) và làm mảnh đường kẻ (1px) */
        h1 {
            color: #00338d;
            font-size: 18pt; 
            text-align: center;
            text-transform: uppercase;
            margin-top: 5px;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid #00338d; /* Đường kẻ mảnh 1px */
            letter-spacing: 1px; /* Giãn chữ nhẹ cho sang trọng */
        }

        /* 4. LỚP PHÁ KHUNG ĐỂ PDF TO TOÀN MÀN HÌNH */
        .full-width-pdf {
            width: 100vw;
            position: relative;
            left: 50%;
            right: 50%;
            margin-left: -50vw;
            margin-right: -50vw;
            height: 90vh; /* Cao hơn một chút */
            background-color: #525659;
        }

        /* 5. LINK PHỤ */
        .zoom-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #00338d;
            text-decoration: none;
            font-style: italic;
            font-size: 11pt;
            opacity: 0.8;
        }
        .zoom-link:hover { opacity: 1; text-decoration: underline; }

        /* 6. TỐI ƯU CHO ĐIỆN THOẠI */
        @media (max-width: 600px) {
            .document-container {
                padding: 10px 10px 20px;
            }
            h1 { font-size: 15pt; letter-spacing: 0; }
            .full-width-pdf {
                height: 85vh;
            }
        }
    </style>
</head>
<body>

<div class="document-container">
    <a href="../index.html" class="back-home">← Quay lại trang chủ</a>
    
    <h1>Tổng quan về bảo vệ rơ le</h1>

    <div class="full-width-pdf">
        <iframe 
            src="https://docs.google.com/viewer?url=https://nganhdien.io.vn/data/bvrl/BVRL.pdf&embedded=true" 
            width="100%" 
            height="100%" 
            style="border: none;">
        </iframe>
    </div>

    <a href="bvrl/BVRL.pdf" target="_blank" class="zoom-link">
        [ Mở file gốc / Tải về tài liệu ]
    </a>
</div>

</body>
</html>
