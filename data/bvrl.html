<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tổng quan Bảo vệ Rơ le - T500HB</title>
    <style>
        /* 1. ĐỊNH DẠNG NỀN VÀ KHUNG CHỨA */
        body {
            font-family: "Times New Roman", Times, serif;
            line-height: 1.5;
            color: #000;
            background-color: #e9ecef; /* Màu nền xám nhạt */
            margin: 0;
            padding: 0;
        }

        .document-container {
            max-width: 850px;
            margin: 0 auto;
            background-color: #e9ecef; /* Trùng màu với body để không lộ khung trắng */
            padding: 10px 40px 30px; /* Thu hẹp padding trên để đẩy nội dung lên */
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* 2. DÀN HÀNG NGANG TIÊU ĐỀ VÀ NÚT QUAY LẠI */
        .header-wrapper {
            display: flex;
            align-items: center;
            position: relative;
            border-bottom: 1px solid #00338d; /* Đường kẻ mảnh 1px */
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .back-home {
            position: absolute; /* Đưa nút quay lại về cánh trái */
            left: 0;
            text-decoration: none;
            color: #888;
            font-size: 10.5pt;
            font-style: italic;
            white-space: nowrap;
            z-index: 10;
        }
        .back-home:hover { color: #00338d; text-decoration: underline; }

        h1 {
            width: 100%;
            margin: 0;
            padding: 0;
            color: #00338d;
            font-size: 16pt; /* Thu nhỏ cỡ chữ cho thanh thoát */
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 3. LỚP PHÁ KHUNG ĐỂ PDF TO TOÀN MÀN HÌNH (100vw) */
        .full-width-pdf {
            width: 100vw;
            position: relative;
            left: 50%;
            right: 50%;
            margin-left: -50vw;
            margin-right: -50vw;
            height: 90vh; /* Cao chiếm 90% màn hình */
            background-color: #525659;
        }

        .zoom-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #00338d;
            text-decoration: none;
            font-style: italic;
            font-size: 11pt;
            opacity: 0.8;
        }
        .zoom-link:hover { opacity: 1; text-decoration: underline; }

        /* 4. TỐI ƯU CHO ĐIỆN THOẠI */
        @media (max-width: 600px) {
            .document-container { padding: 10px 10px 20px; }
            .header-wrapper {
                flex-direction: column; 
                align-items: flex-start;
                position: static;
            }
            .back-home { position: static; margin-bottom: 8px; }
            
            /* CHIẾN SỬA DÒNG NÀY */
            h1 { 
                font-size: 12pt; /* Bạn giảm từ 14pt hoặc 15pt xuống 12pt hoặc 13pt cho vừa mắt */
                text-align: left; 
            }
            
            .full-width-pdf { height: 85vh; }
        }
    </style>
</head>
<body>

<div class="document-container">
    <div class="header-wrapper">
        <a href="../index.html" class="back-home">← Quay lại trang chủ</a>
        <h1>Tổng quan về bảo vệ rơ le</h1>
    </div>

    <div class="full-width-pdf">
        <iframe 
            src="https://docs.google.com/viewer?url=https://nganhdien.io.vn/data/bvrl/BVRL.pdf&embedded=true" 
            width="100%" 
            height="100%" 
            style="border: none;">
        </iframe>
    </div>


</div>

</body>
</html>
