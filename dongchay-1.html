<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô phỏng Dòng Chảy Liên Tục</title>
    <style>
        /* PHẦN CÀI ĐẶT BIẾN - Bạn có thể thay đổi nhanh tại đây */
        :root {
            --bg-color: #121212;           /* Màu nền trang web */
            --node-color: #2c3e50;         /* Màu của điểm A và B */
            --pipe-bg: #1a1a1a;            /* Màu nền của ống dẫn */
            --stream-color: #00d2ff;       /* Màu chính của dòng chảy */
            --stream-shadow: #0095ff;      /* Màu bóng đổ của dòng chảy */
            --flow-speed: 0.5s;              /* Tốc độ chảy (càng nhỏ càng nhanh) */
            --pipe-height: 12px;           /* Độ dày của ống dẫn */
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .container {
            display: flex;
            align-items: center;
            width: 80%;
            max-width: 600px;
            gap: 0; /* Gắn liền mạch */
        }

        /* Điểm đầu và cuối */
        .node {
            width: 60px;
            height: 60px;
            background-color: var(--node-color);
            border: 2px solid #34495e;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 2;
        }

        /* Thân ống dẫn */
        .pipe {
            flex-grow: 1;
            height: var(--pipe-height);
            background-color: var(--pipe-bg);
            position: relative;
            overflow: hidden;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
            /* Tạo hiệu ứng ống tròn 3D */
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
        }

        /* Lớp dòng chảy bên trong */
        .stream {
            position: absolute;
            top: 0;
            left: 0;
            width: calc(100% + 40px); /* Dư ra để animation không bị hụt */
            height: 100%;
            
            /* Tạo các vạch dòng chảy bằng Gradient */
            background-image: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 20px,
                var(--stream-color) 20px,
                var(--stream-color) 40px
            );
            
            /* Hiệu ứng phát sáng cho dòng chảy */
            filter: drop-shadow(0 0 5px var(--stream-shadow));
            
            /* Chạy animation */
            animation: flow var(--flow-speed) linear infinite;
        }

        /* Định nghĩa chuyển động từ trái sang phải */
        @keyframes flow {
            from {
                transform: translateX(-40px);
            }
            to {
                transform: translateX(0);
            }
        }

        .description {
            margin-top: 50px;
            text-align: center;
            color: #666;
            line-height: 1.6;
        }

        .description b {
            color: var(--stream-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="node">A</div>

        <div class="pipe">
            <div class="stream"></div>
        </div>

        <div class="node">B</div>
    </div>

    <div class="description">
        <h3>Mô phỏng Dòng Chảy Liên Tục (CSS Only)</h3>
        <p>Sử dụng <b>repeating-linear-gradient</b> và <b>animation</b> để tạo cảm giác dòng chảy.<br>
        Phù hợp cho mạch điện, ống nước hoặc luồng dữ liệu đơn giản.</p>
    </div>

</body>
</html>
